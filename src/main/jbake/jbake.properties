site.host=https://fahimfarook.me
site.title=Fahim Farook
site.description=CTO & Software Architect - Distributed Systems, Enterprise Architecture, Telecom Digital Transformation

# Theme: "tufte" or "crimson"
site.theme=crimson

# Rendering
render.tags=false
render.sitemap=false
render.feed=true
render.archive=false
render.index=false

# Processing
render.encoding=UTF-8
default.type=page
default.status=published

# Directories
asset.folder=assets
content.folder=content
template.folder=templates

# Template mappings
template.page.file=page.ftl
template.post.file=post.ftl
template.index.file=index.ftl
template.writing.file=writing.ftl

# Markdown extensions
markdown.extensions=ALL

